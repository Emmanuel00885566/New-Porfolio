<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#080c12"/>
  
  <!-- Border glow -->
  <rect width="100" height="100" rx="20" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.6"/>
  
  <!-- Letter E -->
  <text
    x="12"
    y="68"
    font-family="Arial Black, sans-serif"
    font-size="58"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-2"
  >E</text>

  <!-- The dash in accent blue -->
  <text
    x="58"
    y="68"
    font-family="Arial Black, sans-serif"
    font-size="58"
    font-weight="900"
    fill="#3b82f6"
  >-</text>
</svg>